version: "3.9"

services:
  api:
    build:
      context: ./apps/api
    container_name: revenueflow_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./apps/api
    container_name: revenueflow_worker
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres
      - redis
    command: celery -A app.core.celery_app.celery worker --loglevel=info

  postgres:
    image: postgres:16
    container_name: revenueflow_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - revenueflow_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: revenueflow_redis
    ports:
      - "6379:6379"

  web:
    build:
      context: ./apps/web
    container_name: revenueflow_web
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: npm run dev

volumes:
  revenueflow_postgres_data: